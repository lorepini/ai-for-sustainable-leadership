    2. Replace the contents of <script id="quiz-data"> below with your own JSON
       following the same schema (subject, subjectId, blocks → questions)
    3. That's it — open in a browser, works offline. Progress is stored per
       subjectId in localStorage so different subjects don't collide.

  QUESTION SCHEMA:
    {
      "subject":   "<display name>",
      "subjectId": "<unique slug, used for localStorage>",
      "blocks": [

          "id":    "<unique short id>",

          "questions": [
            {
              "q": "<question text>",
              "options": ["A text", "B text", "C text", "D text"],
              "answer": <0-based index of the correct option>,
              "rationale": "<one-line explanation shown after answering>"
            },
            ...
          ]
        },
        ...
      ]
    }

<style>
:root{
  --bg:#f7f8fa;
  --panel:#ffffff;
  --ink:#1f2937;
  --muted:#6b7280;
  --line:#e5e7eb;
  --accent:#2563eb;
  --accent-soft:#dbeafe;
  --good:#16a34a;
  --good-soft:#dcfce7;
  --bad:#dc2626;
  --bad-soft:#fee2e2;
  --gold:#d97706;
  --silver:#9ca3af;
  --bronze:#b45309;
  --radius:12px;
  --shadow:0 1px 2px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Atkinson Hyperlegible','Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
  transition:background-color .25s ease;
}
body.flash-good{background:var(--good-soft)}
body.flash-bad{background:var(--bad-soft)}

.app{max-width:880px;margin:0 auto;padding:32px 20px 80px}

/* ---------- top bar ---------- */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.topbar h1{font-size:1.4rem;font-weight:700;letter-spacing:-.01em}
.topbar .sub{color:var(--muted);font-size:.85rem;margin-top:2px}
.home-btn{
  appearance:none;background:none;border:1px solid var(--line);
  font:inherit;color:var(--muted);cursor:pointer;
  padding:6px 12px;border-radius:8px;font-size:.85rem;font-weight:600;
}
.home-btn:hover{background:#fff;color:var(--ink)}
.topbar-right{display:flex;align-items:center;gap:10px}
.timer{
  display:inline-flex;align-items:center;gap:6px;
  font-variant-numeric:tabular-nums;font-weight:700;font-size:.92rem;
  color:var(--ink);padding:6px 12px;border-radius:8px;
  background:#f3f4f6;border:1px solid var(--line);min-width:78px;justify-content:center;
}
.timer.paused{color:var(--muted);background:#fafafa}
.timer .dot{
  width:6px;height:6px;border-radius:50%;background:var(--good);
  animation:pulse 1.4s ease-in-out infinite;
}
.timer.paused .dot{background:var(--muted);animation:none}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* ---------- screens ---------- */
.screen{display:none;animation:fade .25s ease}
.screen.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ---------- home: medal shelf ---------- */
.medal-shelf{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:16px 18px;margin-bottom:20px;box-shadow:var(--shadow);
}
.medal-shelf h2{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:10px}
.medal-row{display:flex;flex-wrap:wrap;gap:10px}
.medal{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 12px;border-radius:999px;
  background:#fef9e6;border:1px solid #fde68a;
  font-size:.82rem;font-weight:600;color:#92400e;
}
.medal .ic{font-size:1.05rem;line-height:1}
.medal.empty{background:#f3f4f6;border-color:var(--line);color:#9ca3af}
.medal.silver{background:#f3f4f6;border-color:#d1d5db;color:#374151}
.medal.bronze{background:#fef3c7;border-color:#fcd34d;color:#92400e}

/* ---------- home: block tiles ---------- */
.tile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.tile{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px 18px 16px;cursor:pointer;transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease;
  box-shadow:var(--shadow);
  display:flex;flex-direction:column;gap:10px;text-align:left;
  font:inherit;color:inherit;appearance:none;
}
.tile:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.08);border-color:#cbd5e1}
.tile-title{font-weight:700;font-size:1rem;color:var(--ink)}
.tile-meta{font-size:.8rem;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
.tile-medals{display:flex;gap:6px;flex-wrap:wrap;min-height:22px}
.tile-medals .medal{padding:3px 8px;font-size:.72rem}
.tile.mixed{background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;border-color:transparent}
.tile.mixed .tile-title{color:#fff}
.tile.mixed .tile-meta{color:rgba(255,255,255,.85)}

/* ---------- quiz ---------- */
.progress-wrap{margin-bottom:18px}
.progress-bar{height:8px;background:var(--line);border-radius:999px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);transition:width .35s ease;width:0%}
.progress-meta{display:flex;justify-content:space-between;font-size:.78rem;color:var(--muted);margin-top:6px}

.question-card{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:28px 28px 24px;box-shadow:var(--shadow);
}
.q-text{font-size:1.08rem;font-weight:600;line-height:1.5;margin-bottom:22px;color:var(--ink)}
.options{display:grid;gap:10px}
.opt{
  display:block;width:100%;text-align:left;
  padding:14px 16px;border:1.5px solid var(--line);border-radius:10px;
  background:#fff;font:inherit;font-size:.96rem;color:var(--ink);
  cursor:pointer;transition:border-color .12s ease,background-color .12s ease,transform .08s ease;
}
.opt:hover:not(:disabled){border-color:var(--accent);background:#f8fafc}
.opt:active:not(:disabled){transform:scale(.998)}
.opt:disabled{cursor:default;opacity:.95}
.opt .letter{
  display:inline-block;width:22px;height:22px;line-height:22px;text-align:center;
  background:#f3f4f6;border-radius:6px;font-weight:700;font-size:.78rem;margin-right:10px;color:var(--muted);
}
.opt.correct{border-color:var(--good);background:var(--good-soft)}
.opt.correct .letter{background:var(--good);color:#fff}
.opt.wrong{border-color:var(--bad);background:var(--bad-soft)}
.opt.wrong .letter{background:var(--bad);color:#fff}

.feedback{margin-top:18px;display:none}
.feedback.show{display:block;animation:fade .2s ease}
.feedback .verdict{font-weight:700;font-size:1.02rem;margin-bottom:6px}
.feedback.good .verdict{color:var(--good)}
.feedback.bad .verdict{color:var(--bad)}
.feedback .rationale{color:#374151;font-size:.92rem}
.feedback .next-btn{
  margin-top:14px;appearance:none;border:none;
  background:var(--accent);color:#fff;font:inherit;font-weight:600;
  padding:10px 22px;border-radius:8px;cursor:pointer;font-size:.92rem;
}
.feedback .next-btn:hover{background:#1d4ed8}

/* ---------- break modal ---------- */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;
  align-items:center;justify-content:center;padding:24px;z-index:50;
  animation:fade .2s ease;
}
.modal-backdrop.show{display:flex}
.modal{
  background:#fff;border-radius:var(--radius);max-width:420px;width:100%;
  padding:28px 24px 22px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.18);
}
.modal h3{font-size:1.2rem;margin-bottom:8px}
.modal p{color:var(--muted);font-size:.92rem;margin-bottom:18px}
.modal .row{display:flex;gap:10px;justify-content:center}
.modal button{
  appearance:none;border:none;font:inherit;font-weight:600;
  padding:10px 20px;border-radius:8px;cursor:pointer;font-size:.92rem;
}
.modal .primary{background:var(--accent);color:#fff}
.modal .primary:hover{background:#1d4ed8}
.modal .ghost{background:#f3f4f6;color:var(--ink)}
.modal .ghost:hover{background:#e5e7eb}

/* ---------- end screen ---------- */
.end-card{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:32px 28px;text-align:center;box-shadow:var(--shadow);
}
.end-card h2{font-size:1.4rem;margin-bottom:6px}
.end-card .sub{color:var(--muted);margin-bottom:22px}
.end-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px}
.end-stat{background:#f8fafc;border-radius:10px;padding:14px 6px}
.end-stat .v{font-size:1.6rem;font-weight:700;color:var(--ink)}
.end-stat .l{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.earned-medals{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin:8px 0 22px}
.earned-medals:empty{display:none}
.earned-medals .medal{font-size:.9rem;padding:8px 14px}
.end-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.end-actions button{
  appearance:none;border:none;font:inherit;font-weight:600;
  padding:10px 22px;border-radius:8px;cursor:pointer;font-size:.92rem;
}
.end-actions .primary{background:var(--accent);color:#fff}
.end-actions .primary:hover{background:#1d4ed8}
.end-actions .ghost{background:#f3f4f6;color:var(--ink)}
.end-actions .ghost:hover{background:#e5e7eb}

@media (max-width:500px){
  .app{padding:18px 14px 60px}
  .question-card{padding:20px 18px}
  .q-text{font-size:1rem}
  .opt{font-size:.92rem;padding:12px 14px}
  .end-stats{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

            "Background data processing on devices",

            "Comply with all current regulations",

          "answer": 2,

            "Transparency and accountability",
            "Trust and consent",
            "Privacy and fairness"

            "Temporal dependency (Hahn et al.)",
            "Stakeholder theory",
            "Triple bottom line",
            "Circular economy"

            "Adding a fairness audit before release",
            "Embedding ethical considerations into the design and development process from the start",

            "Running annual third-party audits"

            "A supplemental virtue",
            "A regulatory burden",
            "A communication priority",
            "A measurable KPI"

            "Shareholder return",

            "Visionary disruption",
            "Process compliance"
          ],

        },
        {
          "q": "Crawford's AI ecosystem stage that includes the human data labelling workforce is:",
          "options": [
            "Deployment and use",
            "Impact and waste",
            "Natural resources",
            "Recovery and circularity",
            "Inference and serving"

        {

            "Human-centred values and fairness",
            "Transparency and explainability",
            "Robustness, security and safety",
            "Accountability"
          ],

            "Mandate (a) HITL: this maximises human oversight and minimises cognitive surrender; volume cost is a price worth paying for safety.",
            "Mandate (b) HOTL: scalability is the deciding criterion; consumer groups overstate the risk.",
            "Mandate neither; leave it to firms to choose based on their risk appetite; the market will discipline poor designs.",
            "A tiered hybrid: HITL for high-impact recommendations crossing pre-defined thresholds (large allocation changes, retirement-account moves, leverage requests); HOTL for routine rebalancing. The framework anchor is RACI plus its breakdown at AI scale (S17): A must be a singular human role at the firm regardless of HITL or HOTL — and the design choice between the two should follow whether C and I can practically operate at the volume of decisions involved. Combine with the EU AI Act's high-risk treatment of credit/finance services to set the floor of obligations, Floridi & Cowls' explicability to demand audit logging for both tiers, and Kahneman/cognitive-surrender literature to argue that the HITL portion be designed for active System-2 deliberation (constructive friction, confidence intervals, explainable reasons) rather than passive sign-off.",
            "Defer the decision to a future regulation cycle; the technology is changing too fast to legislate now."
          ],
          "answer": 3,
          "rationale": "Multi-framework synthesis that mirrors the scenario MCQ style of the mock exam: a tiered design grounded in RACI-at-scale (A stays human; C/I feasibility determines HITL vs HOTL); AI Act sets the floor; explicability mandates audit; cognitive surrender shapes how HITL is operationally designed. The single-lens answers all fail because the regulator's question requires integration."
        },
        {
          "q": "Three months after a major manufacturer rolls out a GenAI assistant to its 4,000 engineers, internal data shows: (i) 35% of engineers use it daily; (ii) the engineers who use it most have shortened their average task time by 28%; (iii) a vocal minority (~12%) reports feeling 'replaced' and refuses to use it; (iv) two senior engineers have quit citing 'loss of meaning'; (v) one near-miss incident traced to an engineer accepting a GenAI suggestion without checking. The CTO must report to the board. Which framework combination produces the BEST report?",
          "options": [
            "Report only the productivity gain (ii) and the adoption rate (i); the other data points are anecdotal.",
            "Frame the rollout as a failure and pause it; (iv) and (v) prove the costs outweigh the benefits.",
            "Pajuoja (ManCo) four factor families to organise the report by ORGANISATION, INDIVIDUAL, WORK CONTEXT, and TOOL — each data point maps cleanly. Then layer: the productivity gain (ii) is the headline, but the psychological contract (Rousseau 1995) frame explains (iii) and (iv) — implicit promises about what the engineering job entails have been violated; SDT (Deci & Ryan) names the mechanism — autonomy and competence needs are unmet for the resisters; cognitive surrender (S12) explains the near-miss (v) and informs an oversight redesign. The recommendation is not pause but REDESIGN: keep the productivity gains by restoring meaningful authorship for resisters and inserting deliberation friction at high-consequence decision points.",
            "JD-R model alone: classify every data point as either a demand or a resource; this single-lens analysis is sufficient.",
            "Kotter's 8 steps: re-run the change effort from step 1 (urgency), addressing every issue mechanically; the data points are change-management failures."
          ],
          "answer": 2,
          "rationale": "Mock-exam-style synthesis: multiple data points → multiple frameworks integrated. Pajuoja for structure, psychological contract + SDT for the (iii)/(iv) mechanism, cognitive surrender for (v). The decision (REDESIGN, not pause) matters as much as the diagnosis — single-frame answers (D/E) miss the multidimensional pattern."
        },
        {
          "q": "A national rail operator wants to use AI to optimise crew scheduling. The system will be deployed across 6 regions, each with its own union, regulator, and operating practice. The Chief Operating Officer proposes 'centralised governance for consistency, federated tuning for local fit, embedded guardrails for real-time safety' — and asks how to make accountability work across the three layers. Which RACI design BEST fits, and what is the single most important risk to flag?",
          "options": [
            "Three separate RACI matrices (one per governance layer): each layer has its own R/A/C/I. A clean separation prevents confusion.",
            "A single RACI matrix with the COO as A for everything: simplicity and clear single accountability outweigh the volume problem.",
            "One RACI per decision TYPE not per layer: strategic decisions (deploy or pause a region) have the Group COO as A; structural decisions (regional tuning of thresholds) have the regional GM as A; operational decisions (real-time schedule changes) have the embedded guardrails as the executor, with the regional Safety Director as A for outcomes. The most important risk to flag is the SCALE BREAKDOWN of C and I at the operational layer (S17 / Air Canada lesson): at the volume of real-time decisions, no one will actually be consulted or informed about most events — so the operational layer must be designed with automated logging + monthly aggregate audits feeding back to regional safety directors, otherwise problems will accumulate undetected exactly as the Air Canada case predicts.",
            "No RACI is needed; the embedded guardrails ARE the governance and humans can be removed from the loop for efficiency.",
            "Use RACI only for the strategic layer and rely on industry standards for the rest; over-formalising structural and operational layers slows the rollout."
          ],
          "answer": 2,
          "rationale": "Synthesis question: A is singular per decision type (not per layer), and the most important S17 lesson is that RACI's C and I roles collapse at scale unless explicitly redesigned with audit feedback loops. The Air Canada case is the canonical illustration and the question rewards naming it. The other options either oversimplify (B, D, E) or fragment governance incoherently (A)."
        }
      ]
    }
  ]
}
</script>

<div class="app">

  <!-- ============ HOME SCREEN ============ -->

  </section>

  <!-- ============ QUIZ SCREEN ============ -->
  <section id="quiz" class="screen">

      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="end-stat"><div class="v" id="stat-accuracy">0%</div><div class="l">Accuracy</div></div>
        <div class="end-stat"><div class="v" id="stat-time">00:00</div><div class="l">Total time</div></div>
      </div>

      <div class="end-actions">

</div>

<!-- ============ BREAK MODAL ============ -->
<div class="modal-backdrop" id="break-modal">
  <div class="modal">
    <h3>Take a breath 🌿</h3>
    <p id="break-text">You've answered 7 questions. Keep going?</p>
    <div class="row">
      <button class="primary" id="break-continue">Continue</button>
      <button class="ghost" id="break-stop">Stop for now</button>
    </div>
  </div>
</div>

<script>
//================================================================
// MCQ Trainer — engine
//================================================================
const DATA = JSON.parse(document.getElementById('quiz-data').textContent);
const STORAGE_KEY = 'mcq_' + DATA.subjectId + '_progress';

// ---- Medals catalogue ----
const MEDAL_DEFS = {
  finished:  { label: 'Block finished', ic: '🥉', cls: 'bronze' },
  threeX:    { label: '3× completed',   ic: '🥈', cls: 'silver' },
  perfect:   { label: 'Perfect run',    ic: '🥇', cls: '' },
};

// ---- Progress state (persisted) ----
function loadProgress(){
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch(e){ return {}; }
}
function saveProgress(p){ localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); }
function blockState(p, id){
  if (!p[id]) p[id] = { completions: 0, perfectRuns: 0, medals: [] };
  return p[id];
}

// ---- Render: home ----
function renderHome(){
  document.getElementById('subject-title').textContent = DATA.subject + ' — MCQ Trainer';
  const total = DATA.blocks.reduce((n,b)=>n+b.questions.length, 0);
  document.getElementById('subject-sub').textContent = `${total} questions across ${DATA.blocks.length} blocks`;

  const prog = loadProgress();

  // medal shelf — aggregate across blocks
  const shelf = document.getElementById('medal-shelf');
  shelf.innerHTML = '';
  const totalMedals = { finished:0, threeX:0, perfect:0 };
  DATA.blocks.forEach(b => {
    const s = blockState(prog, b.id);
    s.medals.forEach(m => totalMedals[m] !== undefined && totalMedals[m]++);
  });
  Object.entries(MEDAL_DEFS).forEach(([k, def]) => {
    const count = totalMedals[k];
    const el = document.createElement('span');
    el.className = 'medal ' + def.cls + (count === 0 ? ' empty' : '');
    el.innerHTML = `<span class="ic">${def.ic}</span>${def.label} × ${count}`;
    shelf.appendChild(el);
  });

  // tiles
  const grid = document.getElementById('block-grid');
  grid.innerHTML = '';
  DATA.blocks.forEach(b => {
    const s = blockState(prog, b.id);
    const btn = document.createElement('button');
    btn.className = 'tile';
    btn.innerHTML = `
      <div class="tile-title">${escapeHtml(b.title)}</div>
      <div class="tile-meta">
        <span>${b.questions.length} questions</span>
        <span>Completed ${s.completions}×</span>
      </div>
      <div class="tile-medals">${renderMedals(s.medals)}</div>
    `;
    btn.onclick = () => startQuiz([b], b.title);
    grid.appendChild(btn);
  });

  // mixed tile
  const mixed = document.createElement('button');
  mixed.className = 'tile mixed';
  mixed.innerHTML = `
    <div class="tile-title">🎲 Mix all blocks</div>
    <div class="tile-meta">
      <span>${DATA.blocks.reduce((n,b)=>n+b.questions.length,0)} questions, shuffled</span>
      <span>Exam-style</span>
    </div>
    <div class="tile-medals"></div>
  `;
  mixed.onclick = () => startQuiz(DATA.blocks, 'Mixed — all blocks');
  grid.appendChild(mixed);
}

function renderMedals(list){
  if (!list || list.length === 0) return '';
  // dedupe display, but show counts
  const counts = {};
  list.forEach(m => counts[m] = (counts[m] || 0) + 1);
  return Object.entries(counts).map(([k,n]) => {
    const def = MEDAL_DEFS[k];
    if (!def) return '';
    return `<span class="medal ${def.cls}"><span class="ic">${def.ic}</span>${def.label}${n>1 ? ' ×'+n : ''}</span>`;
  }).join('');
}

function escapeHtml(s){ return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ---- Quiz state ----
let quizState = null;

// ---- Session timer (pauses on break modal) ----
const timer = {
  startedAt: 0,       // ms epoch at last resume
  accumulated: 0,     // ms accumulated across paused segments
  intervalId: null,
  running: false,
  reset(){
    this.stop();
    this.startedAt = 0;
    this.accumulated = 0;
    renderTimer(0);
  },
  start(){
    if (this.running) return;
    this.startedAt = Date.now();
    this.running = true;
    document.getElementById('timer').classList.remove('paused');
    this.intervalId = setInterval(() => renderTimer(this.elapsedMs()), 1000);
    renderTimer(this.elapsedMs());
  },
  pause(){
    if (!this.running) return;
    this.accumulated += Date.now() - this.startedAt;
    this.running = false;
    clearInterval(this.intervalId);
    this.intervalId = null;
    document.getElementById('timer').classList.add('paused');
  },
  stop(){
    if (this.running){
      this.accumulated += Date.now() - this.startedAt;
      this.running = false;
    }
    clearInterval(this.intervalId);
    this.intervalId = null;
  },
  elapsedMs(){
    return this.accumulated + (this.running ? Date.now() - this.startedAt : 0);
  },
};

function formatTime(ms){
  const totalSec = Math.floor(ms / 1000);
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function renderTimer(ms){
  document.getElementById('timer-text').textContent = formatTime(ms);
}

function startQuiz(blocks, title){
  // Build queue. For each question keep meta about which block it came from.
  const queue = [];
  blocks.forEach(b => {
    b.questions.forEach((q, i) => {
      queue.push({
        blockId: b.id,
        blockTitle: b.title,
        qid: b.id + '_' + i,
        q: q.q,
        options: q.options,
        answer: q.answer,
        rationale: q.rationale,
        mastered: false,
      });
    });
  });
  shuffle(queue);

  quizState = {
    title,
    blocks,         // blocks involved (for medal awarding)
    queue,
    total: queue.length,
    sessionAnswered: 0,     // total questions answered this session
    sessionCorrect: 0,      // correct-on-first-try this session
    sessionWrongAny: false, // was there any wrong answer this session?
    streak: 0,              // current correct streak
    answeredSinceBreak: 0,  // counts toward the 7-question break
    seenFirstTry: {},       // qid -> bool (whether this question was answered correctly on first try)
  };

  showScreen('quiz');
  document.getElementById('quiz-title').textContent = title;
  document.getElementById('quiz-sub').textContent = `${queue.length} questions to master`;
  timer.reset();
  timer.start();
  nextQuestion();
}

function shuffle(a){
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
}

function nextQuestion(){
  if (quizState.queue.length === 0){
    finishQuiz(true);
    return;
  }
  const q = quizState.queue[0];
  renderQuestion(q);
  updateProgressBar();
}

function renderQuestion(q){
  document.getElementById('q-text').textContent = q.q;
  const optsEl = document.getElementById('options');
  optsEl.innerHTML = '';
  const letters = ['A','B','C','D','E','F'];
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="letter">${letters[i]}</span>${escapeHtml(opt)}`;
    btn.onclick = () => onAnswer(i);
    optsEl.appendChild(btn);
  });
  document.getElementById('feedback').classList.remove('show', 'good', 'bad');
}

function onAnswer(picked){
  const q = quizState.queue[0];
  const correct = picked === q.answer;
  const opts = document.querySelectorAll('#options .opt');
  opts.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add('correct');
    if (i === picked && !correct) b.classList.add('wrong');
  });

  quizState.sessionAnswered++;
  quizState.answeredSinceBreak++;

  // track first-try correctness for perfect-run medal
  const firstTry = !(q.qid in quizState.seenFirstTry);
  if (firstTry) quizState.seenFirstTry[q.qid] = correct;

  if (correct){
    quizState.streak++;
    if (firstTry) quizState.sessionCorrect++;
    flashScreen('good');
    showFeedback(true, q.rationale);
    // mastered (1-correct rule) — remove from queue
    quizState.queue.shift();
    // auto-advance on correct after a short pause
    setTimeout(() => {
      if (!quizState) return;
      handlePostAnswer();
    }, 1100);
  } else {
    quizState.streak = 0;
    quizState.sessionWrongAny = true;
    flashScreen('bad');
    showFeedback(false, q.rationale);
    // Wrong → re-queue 2-4 slots later
    const removed = quizState.queue.shift();
    const offset = Math.min(quizState.queue.length, 2 + Math.floor(Math.random() * 3));
    quizState.queue.splice(offset, 0, removed);
    // Wait for user to click Next on wrong answers
    document.getElementById('next-btn').onclick = handlePostAnswer;
  }
  updateProgressBar();
}

function flashScreen(kind){
  document.body.classList.remove('flash-good', 'flash-bad');
  // force reflow so animation restarts
  void document.body.offsetWidth;
  document.body.classList.add(kind === 'good' ? 'flash-good' : 'flash-bad');
  setTimeout(() => document.body.classList.remove('flash-good', 'flash-bad'), 600);
}

function showFeedback(good, rationale){
  const fb = document.getElementById('feedback');
  fb.classList.add('show', good ? 'good' : 'bad');
  document.getElementById('verdict').textContent = good ? '✓ Correct!' : '✗ Not quite';
  document.getElementById('rationale').textContent = rationale || '';
  document.getElementById('next-btn').style.display = good ? 'none' : 'inline-block';
}

function handlePostAnswer(){
  // Check break (every 7 questions)
  if (quizState.answeredSinceBreak >= 7 && quizState.queue.length > 0){
    quizState.answeredSinceBreak = 0;
    showBreakModal();
    return;
  }
  nextQuestion();
}

function showBreakModal(){
  timer.pause();
  const modal = document.getElementById('break-modal');
  document.getElementById('break-text').textContent =
    `You've answered ${quizState.sessionAnswered} questions in ${formatTime(timer.elapsedMs())}. ${quizState.queue.length} left in the pool — keep going?`;
  modal.classList.add('show');
}

document.getElementById('break-continue').onclick = () => {
  document.getElementById('break-modal').classList.remove('show');
  timer.start();
  nextQuestion();
};
document.getElementById('break-stop').onclick = () => {
  document.getElementById('break-modal').classList.remove('show');
  finishQuiz(false);
};

document.getElementById('quit-btn').onclick = () => {
  if (!quizState || confirm('Quit this session? Progress for this session will be lost.')){
    timer.stop();
    quizState = null;
    showScreen('home');
    renderHome();
  }
};

function updateProgressBar(){
  const mastered = quizState.total - quizState.queue.length;
  const pct = Math.round((mastered / quizState.total) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${mastered} / ${quizState.total} mastered`;
  document.getElementById('streak-text').textContent = `Streak: ${quizState.streak}`;
}

function finishQuiz(completed){
  if (!quizState) return;
  timer.stop();
  const earned = [];

  // Award medals ONLY if the session actually completed all questions
  // AND covered exactly one block (mixed mode does not award per-block medals).
  if (completed && quizState.blocks.length === 1){
    const block = quizState.blocks[0];
    const prog = loadProgress();
    const s = blockState(prog, block.id);
    s.completions++;
    // first-time finishing this block
    if (!s.medals.includes('finished')){
      s.medals.push('finished'); earned.push('finished');
    }
    // 3× completed
    if (s.completions >= 3 && !s.medals.includes('threeX')){
      s.medals.push('threeX'); earned.push('threeX');
    }
    // perfect run (no wrong answers this whole session)
    if (!quizState.sessionWrongAny){
      s.perfectRuns++;
      // award a perfect medal every time, so it stacks (counts how many perfect runs)
      s.medals.push('perfect'); earned.push('perfect');
    }
    saveProgress(prog);
  }

  // Stats
  const answered = quizState.sessionAnswered;
  const correct = quizState.sessionCorrect;
  const accuracy = answered ? Math.round((correct / answered) * 100) : 0;

  document.getElementById('end-title').textContent = completed ? 'All mastered! 🎉' : 'Session stopped';
  document.getElementById('end-sub').textContent = completed
    ? quizState.title
    : `${quizState.queue.length} questions still unmastered in ${quizState.title}`;
  const totalMs = timer.elapsedMs();
  document.getElementById('stat-answered').textContent = answered;
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-accuracy').textContent = accuracy + '%';
  document.getElementById('stat-time').textContent = formatTime(totalMs);
  const avgSec = answered ? Math.round((totalMs / 1000) / answered) : 0;
  document.getElementById('stat-avg-time').textContent =
    answered ? `Average ${avgSec}s per question` : '';

  const earnedEl = document.getElementById('earned-medals');
  earnedEl.innerHTML = earned.map(m => {
    const def = MEDAL_DEFS[m];
    return `<span class="medal ${def.cls}"><span class="ic">${def.ic}</span>New medal: ${def.label}</span>`;
  }).join('');

  showScreen('end');
}

document.getElementById('end-again').onclick = () => {
  if (!quizState) { showScreen('home'); renderHome(); return; }
  startQuiz(quizState.blocks, quizState.title);
};
document.getElementById('end-home').onclick = () => {
  quizState = null;
  showScreen('home');
  renderHome();
};

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.toggle('active', s.id === id));
  window.scrollTo({top:0, behavior:'instant'});
}

// ---- boot ----
renderHome();
</script>
